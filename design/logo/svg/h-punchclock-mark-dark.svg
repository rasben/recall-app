<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Recall — Punch Clock">
  <!-- Iteration H: Punch Clock. A factory-style wall clock with a card slot below. -->
  <!-- Clock rim -->
  <circle cx="256" cy="216" r="152" fill="none" stroke="#F5F2EC" stroke-width="24" />
  <!-- Cardinal hour ticks -->
  <g stroke="#F5F2EC" stroke-width="12" stroke-linecap="round">
    <line x1="256" y1="76"  x2="256" y2="96"  />
    <line x1="396" y1="216" x2="376" y2="216" />
    <line x1="256" y1="356" x2="256" y2="336" />
    <line x1="116" y1="216" x2="136" y2="216" />
  </g>
  <!-- Hour hand (to 10) -->
  <line x1="256" y1="216" x2="194" y2="180"
        stroke="#F5F2EC" stroke-width="18" stroke-linecap="round" />
  <!-- Minute hand (to 2) — accent -->
  <line x1="256" y1="216" x2="351" y2="161"
        stroke="#ffdb33" stroke-width="14" stroke-linecap="round" />
  <!-- Center peg -->
  <circle cx="256" cy="216" r="10" fill="#F5F2EC" />
  <!-- Card slot -->
  <rect x="156" y="400" width="200" height="40" rx="12"
        fill="none" stroke="#F5F2EC" stroke-width="10" />
  <line x1="184" y1="420" x2="328" y2="420"
        stroke="#F5F2EC" stroke-width="8" stroke-linecap="round" />
</svg>
