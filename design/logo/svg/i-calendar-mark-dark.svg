<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Recall — Calendar">
  <!-- Iteration I: Calendar. Outlined page with binder tabs, header bar, grid of date dots,
       one day highlighted in the app primary. -->
  <!-- Binder tabs -->
  <rect x="152" y="104" width="20" height="52" rx="6" fill="#F5F2EC" />
  <rect x="340" y="104" width="20" height="52" rx="6" fill="#F5F2EC" />
  <!-- Calendar body -->
  <rect x="80" y="144" width="352" height="288" rx="24"
        fill="none" stroke="#F5F2EC" stroke-width="20" />
  <!-- Header divider -->
  <line x1="96" y1="214" x2="416" y2="214"
        stroke="#F5F2EC" stroke-width="14" stroke-linecap="round" />
  <!-- Grid of date dots, 4 cols × 3 rows, "today" at (224, 330) swapped for accent -->
  <g fill="#F5F2EC">
    <circle cx="152" cy="270" r="16" />
    <circle cx="224" cy="270" r="16" />
    <circle cx="296" cy="270" r="16" />
    <circle cx="368" cy="270" r="16" />

    <circle cx="152" cy="330" r="16" />
    <circle cx="296" cy="330" r="16" />
    <circle cx="368" cy="330" r="16" />

    <circle cx="152" cy="390" r="16" />
    <circle cx="224" cy="390" r="16" />
    <circle cx="296" cy="390" r="16" />
    <circle cx="368" cy="390" r="16" />
  </g>
  <!-- Today -->
  <circle cx="224" cy="330" r="22" fill="#ffdb33" />
</svg>
