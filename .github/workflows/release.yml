name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            label: macos-x86_64
          - platform: ubuntu-22.04
            args: ''
            label: linux
          - platform: windows-latest
            args: ''
            label: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing: tauri-action attempts signing only when
          # APPLE_CERTIFICATE is present in the environment. The vars below
          # are intentionally omitted — unsigned .dmg builds work fine for
          # users who right-click → Open on first launch. To enable signing
          # later, add the Apple secrets to repo Settings → Secrets and
          # uncomment these lines:
          #   APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          #   APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          #   APPLE_ID: ${{ secrets.APPLE_ID }}
          #   APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Recall ${{ github.ref_name }}
          releaseBody: |
            ## Download

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `Recall-macOS-AppleSilicon.dmg` |
            | macOS (Intel) | `Recall-macOS-Intel.dmg` |
            | Windows (installer) | `Recall-Windows.exe` |
            | Windows (MSI) | `Recall-Windows.msi` |
            | Linux | `Recall-Linux.AppImage` · `Recall-Linux.deb` · `Recall-Linux.rpm` |

            **macOS note:** If the app is unsigned, right-click → Open on first launch to bypass Gatekeeper.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  rename-assets:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Rename release assets to friendly names
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          RELEASE_ID=$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.id')
          ASSETS=$(gh api "repos/${REPO}/releases/${RELEASE_ID}/assets" --jq '.[] | "\(.id) \(.name)"')

          mkdir -p /tmp/assets

          while IFS= read -r line; do
            ASSET_ID=$(echo "$line" | awk '{print $1}')
            ASSET_NAME=$(echo "$line" | awk '{print $2}')

            case "$ASSET_NAME" in
              recall_*_aarch64.dmg)    FRIENDLY="Recall-macOS-AppleSilicon.dmg" ;;
              recall_*_x64.dmg)        FRIENDLY="Recall-macOS-Intel.dmg" ;;
              recall_*_x64-setup.exe)  FRIENDLY="Recall-Windows.exe" ;;
              recall_*_en-US.msi)      FRIENDLY="Recall-Windows.msi" ;;
              recall_*_amd64.AppImage) FRIENDLY="Recall-Linux.AppImage" ;;
              recall_*_amd64.deb)      FRIENDLY="Recall-Linux.deb" ;;
              recall-*.x86_64.rpm)     FRIENDLY="Recall-Linux.rpm" ;;
              *)                        continue ;;
            esac

            # Download asset via API (works for draft releases)
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/octet-stream" \
              "https://api.github.com/repos/${REPO}/releases/assets/${ASSET_ID}" \
              -o "/tmp/assets/${FRIENDLY}"

            gh release upload "$TAG" --repo "$REPO" --clobber "/tmp/assets/${FRIENDLY}"
            gh api "repos/${REPO}/releases/assets/${ASSET_ID}" -X DELETE
          done <<< "$ASSETS"
