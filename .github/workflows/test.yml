name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm install

      - name: TypeScript check
        run: npm run check

      - name: Rust tests
        run: npm test
        env:
          RECALL_TEST_GITHUB_TOKEN: ${{ secrets.RECALL_TEST_GITHUB_TOKEN }}
          RECALL_TEST_GITHUB_USERNAME: ${{ secrets.RECALL_TEST_GITHUB_USERNAME }}
          RECALL_TEST_JIRA_SITE_URL: ${{ secrets.RECALL_TEST_JIRA_SITE_URL }}
          RECALL_TEST_JIRA_EMAIL: ${{ secrets.RECALL_TEST_JIRA_EMAIL }}
          RECALL_TEST_JIRA_API_TOKEN: ${{ secrets.RECALL_TEST_JIRA_API_TOKEN }}
          RECALL_TEST_ZULIP_REALM_URL: ${{ secrets.RECALL_TEST_ZULIP_REALM_URL }}
          RECALL_TEST_ZULIP_EMAIL: ${{ secrets.RECALL_TEST_ZULIP_EMAIL }}
          RECALL_TEST_ZULIP_API_KEY: ${{ secrets.RECALL_TEST_ZULIP_API_KEY }}
